<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iron Empire</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0d12; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      #loading {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px; background: #0a0d12; color: #e9eef6;
        font: 500 15px/1.4 "Avenir Next", "Segoe UI", system-ui, sans-serif; z-index: 50;
        transition: opacity 0.7s ease; letter-spacing: 0.4px;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      #loading .title { font-size: 34px; font-weight: 800; letter-spacing: 3px; color: #d9a94c; }
      .spinner {
        width: 36px; height: 36px; border: 3px solid rgba(217,169,76,0.25);
        border-top-color: #d9a94c; border-radius: 50%; animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">
      <div class="title">IRON EMPIRE</div>
      <div class="spinner"></div>
      <div>Surveying the territory…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
